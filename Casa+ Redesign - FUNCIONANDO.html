<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Casa+ · A casa que muda sua história</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bordo:       #722020;
    --bordo-dark:  #501515;
    --bordo-light: #A13030;
    --bordo-soft:  #F4E6E6;
    --ink:         #0A0A0A;
    --ink-2:       #3A3A3A;
    --ink-3:       #6A6A6A;
    --line:        #E6E4E4;
    --line-2:      #F0EEEE;
    --gray-brand:  #CCCACA;
    --paper:       #FAF9F7;
    --paper-2:     #F1EFED;
    --white:       #FFFFFF;
    --success:     oklch(0.58 0.12 155);
    --whats:       #25D366;
    --radius:      14px;
    --radius-lg:   22px;
    --shadow-sm:   0 1px 2px rgba(20,12,8,.04), 0 1px 1px rgba(20,12,8,.03);
    --shadow-md:   0 4px 16px -4px rgba(20,12,8,.08), 0 2px 6px rgba(20,12,8,.04);
    --shadow-lg:   0 20px 40px -12px rgba(20,12,8,.18), 0 6px 16px -6px rgba(20,12,8,.08);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:'Inter',system-ui,sans-serif;
    color:var(--ink);
    background:var(--paper);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    font-size:16px;
    line-height:1.55;
  }
  h1,h2,h3,h4,h5{font-family:'Archivo',system-ui,sans-serif;letter-spacing:-.03em;margin:0;font-weight:700;line-height:1.05}
  .sans{font-family:'Inter',sans-serif !important}
  p{margin:0}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:0;background:none}
  img{display:block;max-width:100%}
  input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}
  :focus-visible{outline:2px solid var(--bordo);outline-offset:2px;border-radius:6px}
  ::selection{background:var(--bordo);color:#fff}

  /* ---- root app ---- */
  #root{overflow:hidden}

  /* ---- utility: container ---- */
  .wrap{max-width:1240px;margin:0 auto;padding:0 28px}
  @media (max-width:720px){.wrap{padding:0 18px}}

  /* ---- scrollbar polish ---- */
  .scroll-x::-webkit-scrollbar{height:6px}
  .scroll-x::-webkit-scrollbar-thumb{background:var(--line);border-radius:10px}

  /* whatsapp float */
  .wfloat{
    position:fixed;right:22px;bottom:22px;z-index:60;
    background:var(--whats);color:#fff;
    width:60px;height:60px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 12px 32px -8px rgba(37,211,102,.55);
    transition:transform .2s ease;
  }
  .wfloat:hover{transform:scale(1.07)}
  .wfloat .pulse{position:absolute;inset:-6px;border-radius:50%;border:2px solid var(--whats);opacity:.5;animation:pulse-ring 2s ease-out infinite}
  @keyframes pulse-ring { 0%{transform:scale(.9);opacity:.6} 100%{transform:scale(1.4);opacity:0} }

  /* keyframes */
  @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.85)} }
  @keyframes spin { to{transform:rotate(360deg)} }
  @keyframes slide-up { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  @keyframes marquee { from{transform:translateX(0)} to{transform:translateX(-50%)} }
  @keyframes float-up { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  @keyframes reveal { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
  @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
  @keyframes count-up { from{opacity:0;transform:translateY(20px) scale(.95)} to{opacity:1;transform:translateY(0) scale(1)} }
  @keyframes draw-line { from{stroke-dashoffset:200} to{stroke-dashoffset:0} }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>

<!-- Carregamento sequencial de componentes -->
<script type="text/babel">
  // ========================================
  // SHARED UTILITIES
  // ========================================
  const WHATSAPP_URL = "https://wa.me/5563999496259?text=Olá, vim pelo site do Casa+ e quero sair do aluguel.";
  const PHONE_DISPLAY = "(63) 99949-6259";

  const fmtBRL = (v) => v.toLocaleString('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0});
  const fmtBRLd = (v) => v.toLocaleString('pt-BR',{style:'currency',currency:'BRL',minimumFractionDigits:2,maximumFractionDigits:2});

  // MCMV parcel estimator
  function estimateParcel({price, income, fgts=0}){
    let faixa, juros, subsidyMax, imovelMax;
    if(income <= 3200)      { faixa=1; juros=0.04;   subsidyMax=49500; imovelMax=255000; }
    else if(income <= 5000) { faixa=2; juros=0.06;   subsidyMax=25000; imovelMax=255000; }
    else if(income <= 9600) { faixa=3; juros=0.0791; subsidyMax=0;     imovelMax=400000; }
    else                    { faixa=4; juros=0.10;   subsidyMax=0;     imovelMax=600000; }

    let subsidy = 0;
    if(faixa===1)      subsidy = Math.round(49500 * (1 - Math.max(0,(income-2000))/1500));
    else if(faixa===2) subsidy = Math.round(25000 * (1 - (income-3200)/1800));
    subsidy = Math.max(0, Math.min(subsidy, subsidyMax, price*0.35));

    const entradaBase = (price - subsidy) * 0.16;
    const entradaEfetiva = Math.max(0, entradaBase - fgts);
    const financiado = Math.max(10000, price - subsidy - fgts - entradaEfetiva);

    const i = juros/12;
    const n = 420;
    const pmt = financiado * (i*Math.pow(1+i,n))/(Math.pow(1+i,n)-1);
    const seguros = financiado * 0.00028 + 25;
    const total = pmt + seguros;

    const comprometido = total / income;
    const viavel = comprometido <= 0.30 && income >= 1800 && price <= imovelMax;

    return {
      faixa, juros: +(juros*100).toFixed(2), imovelMax, subsidy: Math.round(subsidy),
      financiado: Math.round(financiado), entrada: Math.round(entradaEfetiva),
      parcela: Math.round(total), comprometido: Math.round(comprometido*100), viavel
    };
  }

  // Buttons
  const Btn = ({variant='primary', size='md', icon, iconRight, children, className='', style={}, ...p}) => {
    const base = {
      display:'inline-flex',alignItems:'center',justifyContent:'center',gap:8,
      fontFamily:'Inter',fontWeight:600,
      borderRadius: size==='sm'?10:12,
      transition:'all .18s ease',
      whiteSpace:'nowrap',
      cursor:'pointer',
      userSelect:'none',
      ...(size==='sm' && {padding:'8px 14px',fontSize:13}),
      ...(size==='md' && {padding:'12px 20px',fontSize:14}),
      ...(size==='lg' && {padding:'15px 24px',fontSize:15}),
      ...(size==='xl' && {padding:'18px 28px',fontSize:16}),
    };
    const styles = {
      primary:{background:'var(--bordo)',color:'#fff',boxShadow:'0 4px 14px -4px oklch(0.42 0.13 25 / .4)'},
      dark:{background:'var(--ink)',color:'var(--paper)'},
      ghost:{background:'transparent',color:'var(--ink)',border:'1px solid var(--line)'},
      whats:{background:'var(--whats)',color:'#fff',boxShadow:'0 4px 14px -4px rgba(37,211,102,.5)'},
      outline:{background:'#fff',color:'var(--bordo)',border:'1.5px solid var(--bordo)'},
      invert:{background:'#fff',color:'var(--bordo)'},
      paper:{background:'var(--paper-2)',color:'var(--ink)'},
    };
    return (
      <button {...p} className={className} style={{...base,...styles[variant],...style}}
        onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-1px)';e.currentTarget.style.filter='brightness(1.05)'}}
        onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.filter=''}}>
        {icon}{children}{iconRight}
      </button>
    );
  };

  // WhatsApp link wrapper
  const WhatsLink = ({children, msg, ...p}) => {
    const url = msg ? `https://wa.me/5563999496259?text=${encodeURIComponent(msg)}` : WHATSAPP_URL;
    return <a href={url} target="_blank" rel="noopener noreferrer" {...p}>{children}</a>;
  };

  // Pill / Tag
  const Pill = ({tone='bordo', children, style={}}) => {
    const map = {
      bordo:{bg:'oklch(0.95 0.03 25)',color:'var(--bordo)'},
      paper:{bg:'rgba(255,255,255,.2)',color:'#fff'},
      success:{bg:'oklch(0.95 0.04 155)',color:'oklch(0.35 0.12 155)'},
    };
    const {bg,color} = map[tone]||map.bordo;
    return (
      <div style={{display:'inline-flex',alignItems:'center',gap:6,padding:'6px 12px',borderRadius:8,background:bg,color,fontSize:11,fontWeight:600,letterSpacing:'.08em',textTransform:'uppercase',...style}}>
        {children}
      </div>
    );
  };

  // WhatsApp Float
  const WhatsFloat = () => (
    <a href={WHATSAPP_URL} target="_blank" rel="noopener noreferrer" className="wfloat" title="Falar no WhatsApp">
      💬
      <div className="pulse"/>
    </a>
  );

  // ========================================
  // HEROES & NAVBAR
  // ========================================
  const Navbar = ({state, setState}) => {
    const [scrolled, setScrolled] = React.useState(false);
    React.useEffect(()=>{
      const onScroll = () => setScrolled(window.scrollY > 20);
      window.addEventListener('scroll', onScroll, {passive:true});
      return () => window.removeEventListener('scroll', onScroll);
    },[]);

    const links = [
      {label:'Casas', href:'#casas'},
      {label:'Como funciona', href:'#processo'},
      {label:'Simular', href:'#simulador'},
      {label:'Depoimentos', href:'#depoimentos'},
      {label:'Dúvidas', href:'#faq'},
    ];

    return (
      <header style={{
        position:'fixed',top:0,left:0,right:0,zIndex:50,
        background: scrolled ? 'rgba(250,247,242,.88)' : 'transparent',
        backdropFilter: scrolled ? 'blur(12px) saturate(140%)' : 'none',
        borderBottom: scrolled ? '1px solid var(--line-2)' : '1px solid transparent',
        transition:'all .25s ease'
      }}>
        <div className="wrap" style={{display:'flex',alignItems:'center',justifyContent:'space-between',height:72}}>
          <a href="#top" style={{display:'flex',alignItems:'center'}}>
            <img src="assets/logo-casamais-oficial.png" alt="Casa+" style={{height:44,width:'auto'}}/>
          </a>

          <nav style={{display:'flex',gap:30,alignItems:'center'}} className="nav-links">
            {links.map(l=>(
              <a key={l.href} href={l.href} style={{
                fontSize:13.5,fontWeight:500,letterSpacing:'.01em',
                color: scrolled ? 'var(--ink-2)' : 'rgba(255,255,255,.86)',
                transition:'color .15s'
              }} onMouseEnter={e=>e.currentTarget.style.color = scrolled ? 'var(--bordo)' : '#fff'}
                 onMouseLeave={e=>e.currentTarget.style.color = scrolled ? 'var(--ink-2)' : 'rgba(255,255,255,.86)'}>
                {l.label}
              </a>
            ))}
          </nav>

          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <a href={`tel:+5563999496259`} style={{
              display:'flex',alignItems:'center',gap:7,fontSize:13,fontWeight:600,
              color: scrolled ? 'var(--ink)' : '#fff'
            }}>
              📞 {PHONE_DISPLAY}
            </a>
            <Btn variant="primary" size="sm" onClick={()=>document.getElementById('simulador')?.scrollIntoView({behavior:'smooth'})}>
              Simular grátis
            </Btn>
          </div>
        </div>
        <style>{`
          @media (max-width: 960px){
            .nav-links{display:none !important}
          }
        `}</style>
      </header>
    );
  };

  // Hero
  const Hero = ({state}) => {
    const [price, setPrice] = React.useState(200000);
    const [income, setIncome] = React.useState(2000);
    const est = estimateParcel({price, income, fgts:0});

    return (
      <section style={{
        position:'relative',minHeight:'min(100vh, 860px)',
        paddingTop:72,
        color:'#fff',
        overflow:'hidden',
        background:'var(--ink)',
        paddingBottom:0
      }} id="top">
        {/* BG image */}
        <div style={{position:'absolute',inset:0,zIndex:0}}>
          <img src="assets/hero-house.jpg" alt="" style={{
            width:'100%',height:'100%',objectFit:'cover',
            transform:'scale(1.02)',
          }}/>
          <div style={{
            position:'absolute',inset:0,
            background:'linear-gradient(100deg, oklch(0.18 0.02 30 / .92) 0%, oklch(0.18 0.02 30 / .78) 38%, oklch(0.18 0.02 30 / .35) 70%, oklch(0.18 0.02 30 / 0) 100%)'
          }}/>
          <div style={{
            position:'absolute',inset:0,
            background:'linear-gradient(180deg, rgba(10,10,10,.4) 0%, transparent 20%, transparent 70%, var(--paper) 100%)'
          }}/>
        </div>

        <div className="wrap" style={{position:'relative',zIndex:2,paddingTop:80,paddingBottom:80,display:'grid',gridTemplateColumns:'1.15fr 1fr',gap:60,alignItems:'center',minHeight:'calc(100vh - 72px)'}}>
          <div style={{maxWidth:620}}>
            <div style={{display:'inline-flex',alignItems:'center',gap:10,fontSize:12,fontWeight:600,letterSpacing:'.14em',textTransform:'uppercase',color:'rgba(255,255,255,.75)'}}>
              <span style={{width:28,height:1,background:'rgba(255,255,255,.5)'}}/>
              Programa Minha Casa Minha Vida · Caixa
            </div>

            <h1 style={{
              fontSize:'clamp(40px, 5.6vw, 82px)',
              fontWeight:800,
              marginTop:22,
              letterSpacing:'-.04em',
              lineHeight:0.94,
              animation:'reveal .9s cubic-bezier(.2,.7,.2,1) both',
            }}>
              Pare de pagar<br/>
              aluguel. Comece<br/>
              a pagar <span style={{color:'var(--bordo-light)'}}>a sua&nbsp;casa.</span>
            </h1>

            <p style={{
              marginTop:24,fontSize:18,lineHeight:1.5,
              color:'rgba(255,255,255,.78)',maxWidth:520,fontWeight:400
            }}>
              Casas prontas em Palmas com parcela que cabe no bolso, subsídio do governo e atendimento humano do primeiro clique até a chave na mão.
            </p>

            <div style={{display:'flex',gap:12,marginTop:34,flexWrap:'wrap'}}>
              <Btn variant="primary" size="lg" onClick={()=>document.getElementById('simulador')?.scrollIntoView({behavior:'smooth'})}>
                Simular minha parcela →
              </Btn>
              <WhatsLink>
                <Btn variant="whats" size="lg">
                  💬 Falar no WhatsApp
                </Btn>
              </WhatsLink>
            </div>

            {/* mini trust row */}
            <div style={{display:'flex',gap:28,marginTop:44,flexWrap:'wrap'}}>
              {[
                {k:'+100', v:'famílias atendidas'},
                {k:'6 anos', v:'construindo em Palmas'},
                {k:'100%', v:'atendimento humano'},
              ].map((s,i)=>(
                <div key={s.k} style={{animation:`count-up .6s cubic-bezier(.2,.7,.2,1) ${0.4+i*0.12}s both`}}>
                  <div style={{fontFamily:'Archivo',fontSize:28,fontWeight:800,letterSpacing:'-.03em'}}>{s.k}</div>
                  <div style={{fontSize:12,opacity:.65,marginTop:2,letterSpacing:'.02em'}}>{s.v}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Inline live simulator */}
          <div style={{
            background:'rgba(255,255,255,.97)',
            color:'var(--ink)',
            borderRadius:20,
            padding:'28px 30px 26px',
            boxShadow:'0 40px 80px -20px rgba(0,0,0,.45), 0 0 0 1px rgba(255,255,255,.1)',
            backdropFilter:'blur(20px)',
            position:'relative',
            animation:'reveal 1s cubic-bezier(.2,.7,.2,1) .3s both',
          }}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
              <div style={{fontSize:12,fontWeight:700,color:'var(--bordo)',letterSpacing:'.12em',textTransform:'uppercase'}}>Simulador rápido</div>
              <Pill tone="success" style={{fontSize:10}}>
                <span style={{width:6,height:6,borderRadius:'50%',background:'var(--success)',display:'inline-block'}}/>
                AO VIVO
              </Pill>
            </div>
            <h3 style={{fontSize:22,fontWeight:700,margin:'2px 0 18px',letterSpacing:'-.025em'}}>
              Sua parcela em 30 segundos
            </h3>

            <div style={{marginTop:14}}>
              <label style={{display:'flex',justifyContent:'space-between',marginBottom:6,fontSize:13,color:'var(--ink-2)',fontWeight:500}}>
                Valor da casa
                <span style={{fontFamily:'Archivo',fontSize:17,fontWeight:700,letterSpacing:'-.015em'}}>{fmtBRL(price)}</span>
              </label>
              <input type="range" min="150000" max="600000" step="5000" value={price} onChange={e=>setPrice(Number(e.target.value))}
                style={{width:'100%',height:8,appearance:'none',WebkitAppearance:'none',background:`linear-gradient(to right, var(--bordo) 0%, var(--bordo) ${(price-150000)/(600000-150000)*100}%, var(--line) ${(price-150000)/(600000-150000)*100}%, var(--line) 100%)`,borderRadius:10,outline:'none',cursor:'pointer'}}/>
            </div>

            <div style={{marginTop:14}}>
              <label style={{display:'flex',justifyContent:'space-between',marginBottom:6,fontSize:13,color:'var(--ink-2)',fontWeight:500}}>
                Sua renda familiar
                <span style={{fontFamily:'Archivo',fontSize:17,fontWeight:700,letterSpacing:'-.015em'}}>{fmtBRL(income)}</span>
              </label>
              <input type="range" min="1800" max="13000" step="100" value={income} onChange={e=>setIncome(Number(e.target.value))}
                style={{width:'100%',height:8,appearance:'none',WebkitAppearance:'none',background:`linear-gradient(to right, var(--bordo) 0%, var(--bordo) ${(income-1800)/(13000-1800)*100}%, var(--line) ${(income-1800)/(13000-1800)*100}%, var(--line) 100%)`,borderRadius:10,outline:'none',cursor:'pointer'}}/>
            </div>

            <div style={{
              marginTop:20,padding:'18px 20px',
              background:'var(--paper-2)',borderRadius:14,
              display:'grid',gridTemplateColumns:'1fr 1fr',gap:14
            }}>
              <div>
                <div style={{fontSize:11,color:'var(--ink-3)',letterSpacing:'.08em',textTransform:'uppercase',fontWeight:600}}>Parcela estimada</div>
                <div style={{fontFamily:'Archivo',fontSize:36,fontWeight:800,color:'var(--bordo)',letterSpacing:'-.035em',lineHeight:1,marginTop:4}}>
                  {fmtBRL(est.parcela)}<span style={{fontSize:13,color:'var(--ink-3)',fontWeight:500,fontFamily:'Inter'}}>/mês</span>
                </div>
              </div>
              <div>
                <div style={{fontSize:11,color:'var(--ink-3)',letterSpacing:'.08em',textTransform:'uppercase',fontWeight:600}}>
                  {est.subsidy>0 ? 'Subsídio estimado' : 'Entrada estimada'}
                </div>
                <div style={{fontFamily:'Archivo',fontSize:22,fontWeight:800,color: est.subsidy>0 ? 'var(--success)' : 'var(--ink)',letterSpacing:'-.025em',marginTop:4,lineHeight:1.1}}>
                  {est.subsidy>0 ? fmtBRL(est.subsidy) : fmtBRL(est.entrada)}
                </div>
                <div style={{fontSize:11,color:'var(--ink-3)',marginTop:2}}>
                  {est.subsidy>0 ? 'do governo' : `+ ${fmtBRL(est.financiado)} financiados`}
                </div>
              </div>
            </div>

            <Btn variant="primary" size="lg" style={{width:'100%',marginTop:14}}
              onClick={()=>document.getElementById('simulador')?.scrollIntoView({behavior:'smooth'})}>
              Receber proposta completa →
            </Btn>
            <div style={{fontSize:11,color:'var(--ink-3)',textAlign:'center',marginTop:10}}>
              Sem compromisso · Sem consulta ao SPC
            </div>
          </div>
        </div>

        <style>{`
          @media (max-width: 960px){
            #top .wrap{grid-template-columns:1fr !important;gap:40px !important}
          }
          input[type=range]::-webkit-slider-thumb{
            -webkit-appearance:none;appearance:none;width:22px;height:22px;
            border-radius:50%;background:#fff;border:3px solid var(--bordo);cursor:grab;box-shadow:0 2px 8px rgba(0,0,0,.15)
          }
          input[type=range]::-moz-range-thumb{
            width:20px;height:20px;border-radius:50%;background:#fff;border:3px solid var(--bordo);cursor:grab
          }
        `}</style>
      </section>
    );
  };

  // ========================================
  // PLACEHOLDER SECTIONS
  // ========================================
  const PainSection = () => (
    <section style={{padding:'100px 0 80px',background:'var(--paper)'}}>
      <div className="wrap">
        <h2 style={{fontSize:'clamp(34px, 4vw, 58px)',fontWeight:500,letterSpacing:'-.025em',lineHeight:1.02}}>
          Todo mês, o aluguel leva um <em style={{fontStyle:'italic',color:'var(--bordo)'}}>pedaço</em> do seu sonho.
        </h2>
        <p style={{fontSize:18,lineHeight:1.55,color:'var(--ink-2)',marginTop:20,maxWidth:540}}>
          Famílias com renda até R$ 13.000 podem financiar a casa própria pelo MCMV, com subsídio do governo.
        </p>
      </div>
    </section>
  );

  const HousesSection = () => (
    <section style={{padding:'100px 0',background:'#fff'}} id="casas">
      <div className="wrap">
        <h2 style={{fontSize:'clamp(32px, 3.8vw, 52px)',marginBottom:40,letterSpacing:'-.025em'}}>
          Casas prontas. Parcela que <em style={{fontStyle:'italic',color:'var(--bordo)'}}>cabe</em>.
        </h2>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:22}}>
          {[
            {img:'assets/house-1.jpg', bairro:'Jardim Aureny III', valor:'R$ 185.000'},
            {img:'assets/house-2.jpg', bairro:'Taquaralto', valor:'R$ 198.000'},
            {img:'assets/house-3.jpg', bairro:'Santa Bárbara', valor:'R$ 215.000'},
          ].map((h,i)=>(
